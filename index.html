<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ahorcado</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main id="card-juego">
        <h1>Juego del Ahorcado</h1>
        <h3>Pista: <span id="pista">Probar, Examen, Testear</span></h3>
        <div class="contenedor-principal">
            <div class="columna-img">
                <img id="imagen-ahorcado" src="img/step_1.png" alt="Ahorcado">
                <h3>Intentos: <span id="intentos">0</span></h3>
            </div>
            <div class="columna-teclado" id="teclado"></div>
        </div>
        
        <div id="palabra">
            <input type="text" class="letra" readonly value="C">
            <input type="text" class="letra" readonly value="I">
            <input type="text" class="letra" readonly value="L">
            <input type="text" class="letra" readonly value="S">
            <input type="text" class="letra" readonly value="A">
        </div>

        <button onclick="cargarNuevaPalabra()">Cambiar palabra</button>
    </main>
    <div id="anuncio-lector" class="sr-only" aria-live="assertive"></div>
    <script src="main.js"></script>
</body>

</html>
