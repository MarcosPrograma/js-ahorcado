<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusForum</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
         
        }
        #vidas{
            font-size: 40px;
            color: red;
            margin-bottom: 20px;
            text-align: center;
    </style>
</head>
<body>
    <!-- CONTENEDOR -->
    <div class="container mt-4">
        <!-- TITULO -->
        <div class="text-center mb-4">
            <h1>Foro Académico</h1>
            <p>
                Compartí información y aprendé jugando
            </p>
        </div>
        <!-- FORMULARIO -->
        <div class="card p-4 mb-4">
            <h3>Crear publicación</h3>
            <form id="formPublicacion">
                <input
                    type="text"
                    id="titulo"
                    class="form-control mb-3"
                    placeholder="Título de la publicación"
                >
                <textarea
                    id="contenido"
                    class="form-control mb-3"
                    placeholder="Contenido"
                ></textarea>
                <select id="categoria" class="form-select mb-3">
                    <option value="">
                        Seleccione una categoría
                    </option>
                    <option value="Programación">
                        Programación
                    </option>
                    <option value="Matemática">
                        Matemática
                    </option>
                    <option value="Historia">
                        Historia
                    </option>
                </select>
                <button class="btn btn-primary w-100">
                    Publicar
                </button>
            </form>
            <p id="mensajeError" class="text-danger mt-2"></p>
        </div>
        <!-- PUBLICACIONES -->
        <div id="contenedorPublicaciones"></div>
        <!-- JUEGO -->
        <div class="card p-4 mt-5">
            <h2 class="text-center mb-4">
                Juego del Ahorcado
            </h2>
            <!-- CORAZONES -->
            <div id="vidas"></div>
            <!-- INPUTS -->
            <div id="palabra"></div>
            <!-- BOTON -->
            <button
                id="btnCambiar"
                class="btn btn-primary"
            >
                Comprobar palabra
            </button>
        </div>
    </div>
    <script>
        // FORO
        let publicaciones = [];
        const formulario = document.getElementById("formPublicacion");
        const contenedor = document.getElementById("contenedorPublicaciones");
        const mensajeError = document.getElementById("mensajeError");
        formulario.addEventListener("submit", function(e){
            e.preventDefault();
            const titulo = document.getElementById("titulo").value;
            const contenido = document.getElementById("contenido").value;
            const categoria = document.getElementById("categoria").value;
            if(
                titulo === "" ||
                contenido === "" ||
                categoria === ""
            ){
                mensajeError.textContent =
                    "Todos los campos son obligatorios";
                return;
            }
            if(contenido.length < 10){
                mensajeError.textContent =
                    "El contenido debe tener mínimo 10 caracteres";
                return;
            }
            mensajeError.textContent = "";
            const nuevaPublicacion = {
                id: Date.now(),
                titulo,
                contenido,
                categoria
            };
            publicaciones.push(nuevaPublicacion);
            mostrarPublicaciones();
            formulario.reset();
        });
        function mostrarPublicaciones(){
            contenedor.innerHTML = "";
            publicaciones.forEach(function(publicacion){
                contenedor.innerHTML += `
                    <div class="card publicacion p-3 mb-3">
                        <h3>${publicacion.titulo}</h3>
                        <span class="badge bg-primary mb-2">
                            ${publicacion.categoria}
                        </span>
                        <p>${publicacion.contenido}</p>
                        <button
                            class="btn btn-danger"
                            onclick="eliminarPublicacion(${publicacion.id})"
                        >
                            Eliminar
                        </button>
                    </div>
                `;
            });
        }
        function eliminarPublicacion(id){
            publicaciones = publicaciones.filter(function(publicacion){
                return publicacion.id !== id;
            });
            mostrarPublicaciones();
        }
        let palabraFija = ["C","I","L","S","A"]; 

        function crearInputsValidacion(){
            const contenedor =
                document.getElementById("palabra");
            contenedor.innerHTML = "";
            for(let i = 0; i < palabraFija.length; i++){
                let input = document.createElement("input");
                input.type = "text";
                input.maxLength = 1;
                input.className = "input-validacion";
                contenedor.appendChild(input);
            }
        }
        function comprobarPalabra(){
            let inputs =
                document.querySelectorAll(".input-validacion");
            let corazones = "";
            // C
            if(inputs[0].value.toUpperCase() == "C"){
                corazones += "❤️";
                inputs[0].style.border =
                    "1px solid black";
            }else{
                inputs[0].style.border =
                    "1px solid black";
            }
            // I
            if(inputs[1].value.toUpperCase() == "I"){
                corazones += "❤️";
            }else{
                inputs[1].style.border =
                    "1px solid black";
            }
            // L
            if(inputs[2].value.toUpperCase() == "L"){
                corazones += "❤️";
                inputs[2].style.border =
                    "1px solid black";
            }else{
                inputs[2].style.border =
                    "1px solid black";
            }
            // S
            if(inputs[3].value.toUpperCase() == "S"){
                corazones += "❤️";
                inputs[3].style.border =
                    "1px solid black";
            }else{
                inputs[3].style.border =
                    "1px solid black";
            }
            // A
            if(inputs[4].value.toUpperCase() == "A"){
                corazones += "❤️";
                inputs[4].style.border =
                    "1px solid black";
            }else{
                inputs[4].style.border =
                    "1px solid black";
            }
            document.getElementById("vidas").innerHTML =
                corazones;
        }
        crearInputsValidacion();
        const btnCambiar =
            document.getElementById("btnCambiar");
        btnCambiar.addEventListener("click", function(e){
            e.preventDefault();
            comprobarPalabra();
        });
    </script>
</body>
</html>
